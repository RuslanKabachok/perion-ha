<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Perion</title>
</head>

<body>
    <main class="scene">
        <section class="hero">
            <div class="hero__bg">
                <div class="products">
                    <div class="product product-pink">
                        <img src="./images/pink.svg" alt="product pink" class="main-img">
                        <img src="./images/pink.svg" alt="product pink reflection" class="reflection">
                    </div>
                    <div class="product product-orange">
                        <img src="./images/orange.svg" alt="product orange" class="main-img">
                        <img src="./images/orange.svg" alt="product orange reflection" class="reflection">
                    </div>
                    <div class="product product-purple">
                        <img src="./images/purple.svg" alt="product purple" class="main-img">
                        <img src="./images/purple.svg" alt="product purple reflection" class="reflection">
                    </div>
                </div>
                <div class="hotspots">
                    <div class="hotspot hotspot--pink">+</div>
                    <div class="hotspot hotspot--orange">+</div>
                    <div class="hotspot hotspot--purple">+</div>
                </div>
                <div class="hero__bottom">
                    <div>
                        <p class="bottom-title">Find your calm with our adaptogen infused range.</p>
                    </div>

                    <div class="hero__bottom-wrapper">
                        <button class="hero__bottom-btn">ADD TO CART</button>

                        <span class="brand">TRIP</span>

                        <span class="divider"></span>

                        <div class="location">
                            <span class="location__label">FIND AT</span>
                            <img src="/images/location-pin.svg" class="pin">
                            <span class="location__address">
                                3619 W 510 N<br>
                                Salt Lake City, UT 84116
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
